# Baby Pulmo — production stack
# Run on VPS: `cd babypulmo/deploy && ./deploy.sh up`
#
# Services:
#   web         — Next.js 14 (standalone build); bound to 127.0.0.1:3000 on host
#                 (host nginx reverse-proxies babypulmo.com -> 127.0.0.1:3000)
#   classifier  — Python FastAPI + onnxruntime; internal network only (Phase 2)
#
# SSL + reverse proxy live on the host nginx — NOT in Docker.
# See deploy/nginx-host/babypulmo.com.conf for the site config to drop into
# /etc/nginx/sites-available/, and DEPLOY-VPS.md Section 5 for the certbot run.
#
# Volumes:
#   classifier_models  — bind-mount of trained .onnx weights from host
#
# Networks:
#   internal — web ↔ classifier private; nothing else can reach classifier.

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    image: babypulmo-web:latest
    container_name: babypulmo-web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - CLASSIFIER_ENDPOINT=http://classifier:8000/predict
    ports:
      # Bind to loopback only — host nginx (and nothing else) can reach this.
      - "127.0.0.1:3000:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  classifier:
    build:
      context: ./classifier
      dockerfile: Dockerfile
    image: babypulmo-classifier:latest
    container_name: babypulmo-classifier
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - MODEL_PATH=/app/models/babypulmo_wav2vec2_int8.onnx
      - PORT=8000
    volumes:
      - classifier_models:/app/models:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Phase 2 only — comment out until trained ONNX exists in classifier_models volume.
    profiles:
      - phase2

networks:
  internal:
    driver: bridge

volumes:
  classifier_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CLASSIFIER_MODELS_DIR:-/var/babypulmo/models}
