# Baby Pulmo — host nginx site config
# Install to /etc/nginx/sites-available/babypulmo.com on the VPS, then:
#   sudo ln -sf /etc/nginx/sites-available/babypulmo.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d babypulmo.com -d www.babypulmo.com
#
# certbot will rewrite this file in-place to add the listen 443 ssl block, the
# certificate paths, and an HTTP-to-HTTPS redirect. Do not hand-edit after that
# — instead, change this canonical source in the repo + `./deploy.sh sync-nginx`.

# Hardening + perf primitives (idempotent at HTTP block level)
# Drop these into /etc/nginx/nginx.conf only if not already present:
#   server_tokens off;
#   gzip on;

server {
    listen 80;
    listen [::]:80;
    server_name babypulmo.com www.babypulmo.com;

    # Generous limits for cough audio uploads (WhatsApp voice notes are <2MB,
    # but allow headroom for re-uploads + multipart overhead)
    client_max_body_size 25m;
    client_body_timeout 60s;

    # Health endpoint for external uptime monitors (no proxy needed)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt ACME challenges (certbot --nginx handles this automatically
    # once the cert is issued; this block is defensive for manual re-issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Main proxy → web container on loopback :3010
    # (port 3000 is occupied by another app on this shared VPS)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        # Preserve client identity for Next.js + audit logging
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket / Next.js HMR support (helps even in production for SSE)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Webhook handlers can take ~10s end-to-end (audio download +
        # classifier inference + TTS synth + Meta Graph send)
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Don't buffer audio responses — stream as they arrive
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Security headers — applied to all responses
    # (HSTS is added by certbot once HTTPS is live; harmless on :80 but ineffective)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Logs (rotate via /etc/logrotate.d/nginx default)
    access_log /var/log/nginx/babypulmo.access.log;
    error_log  /var/log/nginx/babypulmo.error.log warn;
}

# After certbot --nginx runs, it will:
#   1. Add `listen 443 ssl http2;` and IPv6 equivalent to a duplicated server block
#   2. Insert `ssl_certificate` + `ssl_certificate_key` paths under /etc/letsencrypt/
#   3. Rewrite the :80 server to redirect → https://$host$request_uri
#   4. Configure auto-renewal via the certbot.timer systemd unit
