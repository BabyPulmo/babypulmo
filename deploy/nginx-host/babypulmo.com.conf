# Baby Pulmo — host nginx site config
# Install to /etc/nginx/sites-available/babypulmo.com on the VPS, then:
#   sudo ln -sf /etc/nginx/sites-available/babypulmo.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d babypulmo.com -d www.babypulmo.com
#
# certbot will rewrite this file in-place to add the listen 443 ssl block, the
# certificate paths, and an HTTP-to-HTTPS redirect. Do not hand-edit after that
# — instead, change this canonical source in the repo + `./deploy.sh sync-nginx`.

# Hardening + perf primitives (idempotent at HTTP block level)
# Drop these into /etc/nginx/nginx.conf only if not already present:
#   server_tokens off;
#   gzip on;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name babypulmo.com www.babypulmo.com;

    ssl_certificate     /etc/letsencrypt/live/babypulmo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babypulmo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;
    client_body_timeout 60s;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/babypulmo.access.log;
    error_log  /var/log/nginx/babypulmo.error.log warn;
}

# HTTP → HTTPS redirect + ACME challenge passthrough
server {
    listen 80;
    listen [::]:80;
    server_name babypulmo.com www.babypulmo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# After certbot --nginx runs, it will:
#   1. Add `listen 443 ssl http2;` and IPv6 equivalent to a duplicated server block
#   2. Insert `ssl_certificate` + `ssl_certificate_key` paths under /etc/letsencrypt/
#   3. Rewrite the :80 server to redirect → https://$host$request_uri
#   4. Configure auto-renewal via the certbot.timer systemd unit
